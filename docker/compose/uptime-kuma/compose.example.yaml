---
# Example only. Pin image tags before production use.
services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    env_file:
      - env.example
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - /srv/appdata/uptime-kuma:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
