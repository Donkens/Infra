name: lint

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          mapfile -d '' files < <(find . -name "*.sh" -not -path "./.git/*" -print0)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No shell files found"
            exit 0
          fi
          shellcheck --severity=warning "${files[@]}"
